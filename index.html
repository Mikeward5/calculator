<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link href="styles.css" rel="stylesheet" />
    <title>Calculator</title>
</head>
<body>
   <div id="calculator-container">
        <div id="results"></div>
        <div id="buttons">
            <div id="numbers">
                <button id="numberOne" class="buttonBox" value=1>1</button>
                <button id="numberTwo" class="buttonBox" value=2>2</button>
                <button id="numberThree" class="buttonBox" value=3>3</button>
                <button id="numberFour" class="buttonBox" value=4>4</button>
                <button id="numberFive" class="buttonBox" value="5">5</button>
                <button id="numberSix" class="buttonBox" value=6>6</button>
                <button id="numberSeven" class="buttonBox" value=7>7</button>
                <button id="numberEight" class="buttonBox" value=8>8</button>
                <button id="numberNine" class="buttonBox" value=9>9</button>
            </div>
            <div id="operands">
                <button id="remove" class="numberBox">R</button>
                <button id="add" class="numberBox" value="+">+</button>
                <button id="subtract" class="numberBox" value="-">-</button>
                <button id="Multiply" class="numberBox" value="*">X</button>
                <button id="divide" class="numberBox" value="/">/</button>
                <button id="equals" class="numberBox">=</button>

            </div>
        </div>
   </div> 
</body>
</html>
